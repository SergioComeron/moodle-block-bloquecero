name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP Syntax Check
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./.git/*" | xargs -I{} php -l {}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create plugin zip
        run: |
          cd ..
          zip -r bloquecero-${{ steps.version.outputs.VERSION }}.zip bloquecero \
            --exclude "bloquecero/.git/*" \
            --exclude "bloquecero/.github/*" \
            --exclude "bloquecero/.claude/*" \
            --exclude "bloquecero/CLAUDE.md" \
            --exclude "bloquecero/CONTRIBUTING.md" \
            --exclude "bloquecero/.gitignore"
          mv bloquecero-${{ steps.version.outputs.VERSION }}.zip bloquecero/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bloquecero-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
          name: "bloquecero ${{ steps.version.outputs.VERSION }}"
