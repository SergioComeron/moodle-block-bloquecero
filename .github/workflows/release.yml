name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: PHP Syntax Check
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./.git/*" | xargs -I{} php -l {}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create plugin zip
        run: |
          cp -r $GITHUB_WORKSPACE /tmp/bloquecero
          rm -rf /tmp/bloquecero/.git
          rm -rf /tmp/bloquecero/.github
          rm -rf /tmp/bloquecero/.claude
          rm -rf /tmp/bloquecero/vendor
          rm -f /tmp/bloquecero/CLAUDE.md
          rm -f /tmp/bloquecero/CONTRIBUTING.md
          rm -f /tmp/bloquecero/.gitignore
          rm -f /tmp/bloquecero/composer.json
          rm -f /tmp/bloquecero/composer.lock
          cd /tmp
          zip -r bloquecero-${{ steps.version.outputs.VERSION }}.zip bloquecero
          mv /tmp/bloquecero-${{ steps.version.outputs.VERSION }}.zip $GITHUB_WORKSPACE/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          # Fallback if not found
          [ -z "$NOTES" ] && NOTES="Ver CHANGELOG.md para detalles."
          # Write to file to preserve multiline
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bloquecero-${{ steps.version.outputs.VERSION }}.zip
          body_path: release_notes.txt
          name: "bloquecero ${{ steps.version.outputs.VERSION }}"
