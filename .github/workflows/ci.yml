name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  php-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./.git/*" | xargs -I{} php -l {}
